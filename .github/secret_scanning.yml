# GitHub secret scanning — chemins ignorés (fixtures/exemples NON-secrets).
# Pendant natif de l'allowlist gitleaks de la CI (.github/workflows/ci.yml, job security) :
# forge est un OUTIL DE SÉCURITÉ, il porte de FAUX secrets par design (corpus de test de
# rédaction/détection, placeholders de manifestes/docs, constantes d'exemple). Sans ça, le
# secret-scanning natif alerte en boucle sur ces fixtures (ex: tests/test_redact.py = la table
# des faux tokens « qui doivent disparaître »). JAMAIS de vrai secret dans ces chemins.
paths-ignore:
  - "tests/**"
  - "docs/**"
  - "k8s/**"
  - "console/src/sso.rs"
  - "console/src/reports.rs"
  - "forge/signing_pkcs11.py"
