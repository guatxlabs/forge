# Forge — CI (usage AUTORISÉ uniquement, aucun I/O réseau offensif en CI).
# =============================================================================
#
# Jobs :
#   - python  : `python3 -m unittest discover` (cœur pur-stdlib, zéro dépendance) ;
#   - console : `cargo test` + `cargo build --release` du crate Rust de la console.
#
# Le crate `console/` dépend de guatx-core via la git-dep publique `guatxlabs/core@v0.1.0`
# (console/Cargo.toml + Cargo.lock épinglé sur le rev du tag). Les jobs cargo la résolvent
# DIRECTEMENT depuis le repo public — aucun checkout sibling, aucun [patch] : c'est exactement
# ce qu'un clone standalone fait, donc la CI prouve le build public. (En DEV local uniquement,
# console/.cargo/config.toml [GITIGNORÉ] override la git-dep vers ../../core pour la vitesse
# monorepo — build non-locked ; il n'entre jamais en CI ni dans un clone.)
#
# Toutes les versions (actions, toolchain Rust, Python) sont PINNÉES pour la
# reproductibilité.

name: ci

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# Annule les runs obsolètes sur une même ref (économie de runners).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Python — tests du cœur Forge (stdlib only, aucune dépendance à installer).
  # ---------------------------------------------------------------------------
  python:
    name: python (unittest)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout forge
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      # Le CŒUR runtime est stdlib-only, mais la SUITE de tests a besoin de pytest (un test contrib
      # l'importe) + cryptography (les tests ed25519 du ledger l'exigent, sinon repli HMAC → assertions
      # ed25519 KO). Extra `test` de pyproject — n'ajoute AUCUNE dép au runtime livré.
      - name: Install test deps (pytest + cryptography)
        run: |
          python3 -m pip install --upgrade pip
          pip install -e ".[test]"

      # Garde-fou source-de-vérité-unique : échoue si VERSION, pyproject.toml et Cargo.toml
      # divergent (cf. scripts/check_version.py / `make check-version`). Placé AVANT les tests
      # pour fail-fast sur une dérive de version.
      - name: Version drift check (VERSION == pyproject == Cargo.toml)
        run: make check-version

      - name: Unit tests
        run: python3 -m unittest discover -s tests -p 'test_*.py' -v

  # ---------------------------------------------------------------------------
  # Console — tests + build release du crate Rust (avec le sibling core/).
  # ---------------------------------------------------------------------------
  console:
    name: console (cargo test + build --release)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout forge
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust toolchain (pinné)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # @stable (no semver tags; pinned to stable branch commit)
        with:
          toolchain: "1.96.0"
          components: clippy

      - name: Cache cargo (registry + target)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            console/target
          key: cargo-${{ runner.os }}-${{ hashFiles('console/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      # cargo résout guatx-core depuis la git-dep publique guatxlabs/core@v0.1.0 (réseau) —
      # cohérent avec Cargo.lock (source git+tag), identique à un clone standalone.
      - name: cargo test (console)
        working-directory: console
        run: cargo test --locked --verbose

      - name: cargo build --release (console)
        working-directory: console
        run: cargo build --release --locked --verbose

      - name: Upload artefact (binaire console)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: forge
          path: console/target/release/forge
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Console (Postgres) — MATRICE de backend : le job `console` ci-dessus couvre le DÉFAUT SQLite
  # (feature OFF) ; ce job couvre le backend Postgres OPT-IN (`--features store-postgres`) contre un
  # vrai Postgres 16 (service container). Prouve le seam PG + le reconnect+retry HA (Stage 4). Le build
  # community reste byte-identique/openssl-free — c'est le job `console` qui le garde vert.
  # ---------------------------------------------------------------------------
  console-postgres:
    name: console (postgres — cargo test --features store-postgres)
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forgepw
          POSTGRES_DB: forge
        ports:
          - 5432:5432
        # Le runner attend que le service soit SAIN avant de lancer les steps.
        options: >-
          --health-cmd "pg_isready -U forge"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout forge
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust toolchain (pinné)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # @stable (no semver tags; pinned to stable branch commit)
        with:
          toolchain: "1.96.0"
          components: clippy

      - name: Cache cargo (registry + target)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            console/target
          key: cargo-pg-${{ runner.os }}-${{ hashFiles('console/Cargo.lock') }}
          restore-keys: |
            cargo-pg-${{ runner.os }}-

      # clippy DOIT rester vert avec la feature (openssl-free, TLS rustls/ring).
      - name: clippy (feature store-postgres)
        working-directory: console
        run: cargo clippy --all-targets --features store-postgres

      # Le seam PG + les tests d'intégration (dont le reconnect+retry HA) tournent contre le service PG.
      - name: cargo test (feature store-postgres, contre le service Postgres)
        working-directory: console
        env:
          TEST_PG_URL: postgres://forge:forgepw@localhost:5432/forge
        run: cargo test --locked --features store-postgres --verbose

      - name: cargo build --release (feature store-postgres)
        working-directory: console
        run: cargo build --release --locked --features store-postgres --verbose

  # ---------------------------------------------------------------------------
  # Security — supply-chain + secret hygiene (LOW-1). Independent gate: runs in parallel with the
  # build/test jobs and never gates their logic. Two checks:
  #   1) cargo-audit  — RustSec advisory scan of the console crate's locked dep tree (--deny warnings
  #      => unmaintained/yanked/vuln advisories FAIL the job). Reads console/Cargo.lock only (path dep
  #      ../../core is skipped by cargo-audit — no build, no core checkout needed).
  #   2) gitleaks     — secret scan of the tree + history. An ephemeral config (written below, NOT
  #      committed) extends the default ruleset and ALLOWLISTS k8s/10-secrets.example.yaml, whose
  #      documented eval placeholders (all-zero token, `forge`/`forgeadminsecret`) are non-secret by
  #      design — so the scan flags REAL leaks without false-positiving on the eval template.
  # (The Python engine is stdlib-only — zero third-party deps — so there is no pip dependency tree to
  #  audit; the Rust crate is the only supply-chain surface, covered by cargo-audit above.)
  # ---------------------------------------------------------------------------
  security:
    name: security (cargo-audit + gitleaks)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout forge
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # full history so gitleaks can scan past commits, not just the tip.

      - name: Setup Rust toolchain (pinné)
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # @stable (no semver tags; pinned to stable branch commit)
        with:
          toolchain: "1.96.0"

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: cargo audit (console crate — deny warnings)
        working-directory: console
        run: cargo audit --deny warnings

      # Config gitleaks éphémère (runner-only, jamais committée) — extends defaults + allowliste les
      # fixtures/exemples/faux-positifs NON-secrets d'un outil de sécurité (il porte de faux secrets
      # par design). Portée de chaque path (JAMAIS de blanket-suppression d'un vrai secret) :
      #   tests/            → corpus de test rédaction + détection (faux secrets = les fixtures)
      #   docs/             → exemples de documentation (formats de clés)
      #   k8s/              → manifestes de déploiement à placeholders (les vrais secrets = sealed-secrets/vault, hors repo)
      #   console/src/sso.rs      → clés RSA de TEST pour la vérif JWT/OIDC
      #   console/src/reports.rs  → constante AWS canonique du self-test de rédaction
      #   forge/signing_pkcs11.py → faux positif : PKCS11_KEY_LABEL_ENV = nom de variable d'env, pas un secret
      - name: Write gitleaks config (allowlist fixtures/exemples)
        run: |
          cat > "$GITHUB_WORKSPACE/.gitleaks-ci.toml" <<'EOF'
          title = "forge CI gitleaks config"
          [extend]
          useDefault = true
          [allowlist]
          description = "Fixtures/exemples/faux-positifs non-secrets (corpus test redaction+detection, manifestes/docs a placeholders, constantes d'exemple). JAMAIS de blanket-suppression d'un vrai secret."
          paths = [
            '''tests/.*''',
            '''docs/.*''',
            '''k8s/.*''',
            '''console/src/sso\.rs''',
            '''console/src/reports\.rs''',
            '''forge/signing_pkcs11\.py''',
          ]
          EOF

      # Secret scan via le BINAIRE gitleaks ÉPINGLÉ (pas la gitleaks-action). L'action exige désormais
      # GITHUB_TOKEN sur les événements `pull_request` (et une licence pour les orgs) → elle échouerait
      # sur TOUTE PR, ce qui bloquerait le merge sous un ruleset PR-obligatoire. Le binaire : aucun token,
      # aucune licence, comportement IDENTIQUE sur push ET PR, version + SHA256 vérifiés (supply-chain).
      # Version 8.24.3 = version épinglée famille (identique core/plume). Le job security fait un
      # checkout à la RACINE du workspace (pas sous ./forge) → `--source .`. `--config` = là où le
      # heredoc ci-dessus écrit .gitleaks-ci.toml. Testé localement : detect --source . → 0 finding.
      - name: Secret scan (gitleaks, pinned binary — no token/license required)
        run: |
          set -euo pipefail
          GL_VER=8.24.3
          GL_SHA=9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c
          curl -sSfL -o /tmp/gitleaks.tgz "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VER}/gitleaks_${GL_VER}_linux_x64.tar.gz"
          echo "${GL_SHA}  /tmp/gitleaks.tgz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --config "$GITHUB_WORKSPACE/.gitleaks-ci.toml" --no-banner --redact --exit-code 1

  # ---------------------------------------------------------------------------
  # POINT D'ENTRÉE UNIQUE du ruleset — nom STABLE `CI`. Un ruleset sur `main` doit
  # exiger CE check, JAMAIS les noms générés `python (unittest)` / `console (...)`
  # / `security (...)` : le jour où l'un est renommé, réordonné ou ajouté (matrice,
  # nouveau backend…), un check requis par son nom généré ne remonterait plus et
  # `main` deviendrait IMPOUSSABLE — y compris pour le commit qui réparerait ça.
  # Ce job dépend de tous les autres et ne bouge jamais de nom.
  # ⚠️ Ne poser le required-status-check `CI` dans le ruleset qu'APRÈS un premier
  #    run réel (un check jamais exécuté est exigé mais jamais satisfait).
  # ---------------------------------------------------------------------------
  ci-ok:
    name: CI
    if: always()   # sinon un job en échec SAUTE ce job au lieu de le faire échouer
    needs: [python, console, console-postgres, security]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Tous les jobs requis doivent avoir RÉUSSI
        # `skipped` et `cancelled` traités comme des ÉCHECS À DESSEIN : GitHub
        # considère un check requis mais sauté comme satisfait, ce qui laisserait
        # passer un job jamais exécuté.
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')
        run: |
          echo "::error::un job de CI n'a pas réussi : ${{ join(needs.*.result, ', ') }}"
          exit 1
