# Forge — console tier (#13). RWX ledger PVC + Deployment (N replicas) + ClusterIP Service.
# =============================================================================================
# IMAGE: build the console with the Postgres store (and object-store, if used) feature ON:
#     docker build -f Dockerfile --build-arg FORGE_CARGO_FEATURES="store-postgres object-store" \
#         -t <registry>/forge-console:0.0.1 ..
# The DEFAULT (community) image is SQLite-only and will FAIL-CLOSED under FORGE_HA=1 — you MUST use
# a store-postgres image here. Push it and set the `image:` below to your registry ref.
#
# LEADER MODEL (Wave A/B/C): every replica is identical. They self-elect ONE run leader via the
# single-row `leader_lease` (scope='run-worker') in the shared Postgres — the leader executes
# engagements (one-run-per-engagement, DB-fenced), the others serve UI/API and take over on lease
# expiry (TTL 45s). There is deliberately NO separate worker Deployment. `leader`/`instance_id` are
# published on GET /health.
---
# Shared, tamper-evident engagement ledger. RWX so every replica mounts the SAME engagement.jsonl.
# ⚠️ RWX REQUIREMENT: ReadWriteMany needs an RWX-capable StorageClass (NFS / CephFS / EFS /
# Azure Files / Filestore). Plain block volumes (RWO: EBS, GCE-PD, most CSI defaults) CANNOT satisfy
# this and the second replica will fail to schedule. See DEPLOYMENT.md §k8s for the RWX-vs-per-
# instance-ledger-vs-object-store decision — the console serializes its OWN appends per-instance, so
# a shared file across replicas relies on RWX + accepting the concurrent-append caveat; for a strict
# multi-writer audit chain prefer a per-instance ledger (StatefulSet + RWO-per-pod) instead.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forge-ledger
  namespace: forge
  labels: { app.kubernetes.io/part-of: forge, app.kubernetes.io/name: console }
spec:
  accessModes: ["ReadWriteMany"]
  resources:
    requests:
      storage: 5Gi
  # storageClassName: <your-rwx-sc>   # REQUIRED: an RWX class (nfs-*, cephfs, efs-sc, azurefile, ...).
---
# ClusterIP Service in front of the replicas. sessionAffinity: ClientIP pins a source IP to one
# replica (belt-and-suspenders for SSE alongside the Ingress cookie affinity in 50-ingress.yaml —
# per-instance caches + per-instance ledger head make sticky routing the correct posture).
apiVersion: v1
kind: Service
metadata:
  name: forge-console
  namespace: forge
  labels: { app.kubernetes.io/part-of: forge, app.kubernetes.io/name: console }
spec:
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  selector:
    app.kubernetes.io/name: console
  ports:
    - name: http
      port: 7100
      targetPort: 7100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-console
  namespace: forge
  labels: { app.kubernetes.io/part-of: forge, app.kubernetes.io/name: console }
spec:
  replicas: 2   # N replicas — scale freely; the leader lease keeps exactly one run-worker active.
  selector:
    matchLabels:
      app.kubernetes.io/name: console
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: forge
        app.kubernetes.io/name: console
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000     # `forge` user in the image (Dockerfile: USER forge).
        fsGroup: 1000       # own the RWX ledger mount.
      containers:
        - name: forge-console
          # REPLACE with your registry ref of the store-postgres (+object-store) image.
          image: forge-console:0.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7100
          env:
            # Per-pod identity → lease holder key. fieldRef metadata.name is UNIQUE per replica, so
            # each replica has a distinct FORGE_INSTANCE_ID (a static value would collide — exactly
            # the bug to avoid). This is the k8s equivalent of the compose HOSTNAME fallback.
            - name: FORGE_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # Postgres DSN (SECRET) — the fail-closed store gate needs it reachable at boot.
            - name: FORGE_DB_URL
              valueFrom:
                secretKeyRef:
                  name: forge-db
                  key: FORGE_DB_URL
            # Console auth secrets (ingest bearer + argon2id hashes). Stable across replicas.
            - name: FORGE_CONSOLE_TOKEN
              valueFrom:
                secretKeyRef: { name: forge-console-auth, key: FORGE_CONSOLE_TOKEN }
            - name: FORGE_CONSOLE_PASS_HASH
              valueFrom:
                secretKeyRef: { name: forge-console-auth, key: FORGE_CONSOLE_PASS_HASH }
            - name: FORGE_CONSOLE_OPERATOR_HASH
              valueFrom:
                secretKeyRef: { name: forge-console-auth, key: FORGE_CONSOLE_OPERATOR_HASH }
            # S3/MinIO creds (SECRET) — only consumed when the image is built --features object-store.
            - name: FORGE_BLOB_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef: { name: forge-objectstore, key: FORGE_BLOB_S3_ACCESS_KEY }
            - name: FORGE_BLOB_S3_SECRET_KEY
              valueFrom:
                secretKeyRef: { name: forge-objectstore, key: FORGE_BLOB_S3_SECRET_KEY }
          envFrom:
            - configMapRef:
                name: forge-console-config   # FORGE_HA, FORGE_ENTERPRISE_STORE, ADDR, HOST, blob endpoint, ...
          volumeMounts:
            - name: db          # local SQLite fallback (unused under Postgres) — per-pod, NOT shared.
              mountPath: /data/db
            - name: ledger      # shared RWX audit ledger.
              mountPath: /data/ledger
            - name: scope       # inert ROE (read-only).
              mountPath: /data/scope
              readOnly: true
          # /health is PUBLIC (outside auth_guard) and ALWAYS 200 when the HTTP router is live (it
          # returns db:"degraded" without failing on a transient DB blip). Host: localhost is in the
          # default anti-DNS-rebinding allowlist, so the probe is accepted (kubelet would otherwise
          # send Host: <podIP> → 421 → false unhealthy).
          readinessProbe:
            httpGet:
              path: /health
              port: 7100
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 7100
              httpHeaders:
                - name: Host
                  value: localhost
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "1000m", memory: "512Mi" }
      volumes:
        - name: db
          emptyDir: {}
        - name: ledger
          persistentVolumeClaim:
            claimName: forge-ledger
        - name: scope
          configMap:
            name: forge-scope
            items:
              - key: scope.json
                path: scope.json
