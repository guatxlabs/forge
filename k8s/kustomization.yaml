# Forge — HA topology kustomization (#13). `kubectl apply -k k8s/` applies everything in order.
# =============================================================================================
# ⚠️ SECRETS ARE NOT IN THE DEFAULT APPLY PATH (LOW-2). 10-secrets.example.yaml is DELIBERATELY
# absent from `resources` below so `kubectl apply -k k8s/` never ships placeholder credentials
# (forge/forge, forgeadmin/forgeadminsecret). Before applying, the operator MUST create the three
# Secrets `forge-db`, `forge-console-auth`, `forge-objectstore` in the `forge` namespace out-of-band
# (SealedSecrets / ExternalSecrets / SOPS / `kubectl create secret`). The workloads reference those
# Secret names, so without them the console/postgres/minio pods stay Pending on the missing Secret —
# which is the intended fail-safe (no silent default creds). See docs/DEPLOYMENT.md §k8s.
#   • For a LAB bring-up ONLY you may apply the eval placeholders EXPLICITLY, once, on their own:
#         kubectl apply -f 10-secrets.example.yaml     # EVAL ONLY — never in prod.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: forge
resources:
  # 10-secrets.example.yaml intentionally OMITTED — apply real Secrets out-of-band first (see header).
  - 00-namespace.yaml
  - 11-config.yaml
  - 20-postgres.yaml
  - 30-minio.yaml
  - 40-console.yaml
  - 50-ingress.yaml
  - 60-networkpolicies.yaml
