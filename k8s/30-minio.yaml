# Forge — MinIO object-store (#13). Deployment + Service + PVC.
# =============================================================================================
# TEST/DEV object-store target for the console's blob seam (S3BlobStore, feature `object-store`).
# In production, prefer EXTERNAL S3 (AWS S3 / GCS-S3 / a managed MinIO): drop this file, keep
# FORGE_BLOB_S3_ENDPOINT/BUCKET in the ConfigMap pointed at the external endpoint, and the S3 creds
# in the forge-objectstore Secret. Then replace the console->MinIO NetworkPolicy with an
# egress-to-CIDR/FQDN rule toward the external S3 endpoint (see 60-networkpolicies.yaml notes).
# Single replica + RWO PVC: MinIO standalone is not itself HA; use external/managed S3 for prod HA.
---
apiVersion: v1
kind: Service
metadata:
  name: forge-minio
  namespace: forge
  labels: { app.kubernetes.io/part-of: forge, app.kubernetes.io/name: minio }
spec:
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forge-minio-data
  namespace: forge
  labels: { app.kubernetes.io/part-of: forge, app.kubernetes.io/name: minio }
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
  # storageClassName: <your-block-sc>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-minio
  namespace: forge
  labels: { app.kubernetes.io/part-of: forge, app.kubernetes.io/name: minio }
spec:
  replicas: 1
  strategy:
    type: Recreate   # RWO volume — never two pods mounting it at once.
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: forge
        app.kubernetes.io/name: minio
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          envFrom:
            - secretRef:
                name: forge-objectstore   # MINIO_ROOT_USER / MINIO_ROOT_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forge-minio-data
