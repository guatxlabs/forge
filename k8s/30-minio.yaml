# Forge — MinIO object-store (#13). Deployment + Service + PVC.
# =============================================================================================
# TEST/DEV object-store target for the console's blob seam (S3BlobStore, feature `object-store`).
# In production, prefer EXTERNAL S3 (AWS S3 / GCS-S3 / a managed MinIO): drop this file, keep
# FORGE_BLOB_S3_ENDPOINT/BUCKET in the ConfigMap pointed at the external endpoint, and the S3 creds
# in the forge-objectstore Secret. Then replace the console->MinIO NetworkPolicy with an
# egress-to-CIDR/FQDN rule toward the external S3 endpoint (see 60-networkpolicies.yaml notes).
# Single replica + RWO PVC: MinIO standalone is not itself HA; use external/managed S3 for prod HA.
---
apiVersion: v1
kind: Service
metadata:
  name: forge-minio
  namespace: forge
  labels: { app.kubernetes.io/part-of: forge, app.kubernetes.io/name: minio }
spec:
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: forge-minio-data
  namespace: forge
  labels: { app.kubernetes.io/part-of: forge, app.kubernetes.io/name: minio }
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
  # storageClassName: <your-block-sc>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forge-minio
  namespace: forge
  labels: { app.kubernetes.io/part-of: forge, app.kubernetes.io/name: minio }
spec:
  replicas: 1
  strategy:
    type: Recreate   # RWO volume — never two pods mounting it at once.
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: forge
        app.kubernetes.io/name: minio
    spec:
      # --- Pod-level securityContext (MEDIUM-1) ------------------------------------------------
      # MinIO is a static Go binary that binds high ports (9000/9001 > 1024) and only writes /data
      # (owned via fsGroup) — it needs neither root nor any capability. Verified: it reaches
      # "API: http://…:9000 … Online" as uid 1000 with ALL caps dropped + no-new-privileges.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: minio
          # MEDIUM-3 / LOW-10: pinned to a specific released tag AND its immutable digest (was the
          # floating `:latest`, then tag-only). tag+digest = human-readable + tamper-proof. The digest
          # below is that of RELEASE.2025-09-07T16-13-09Z as published on Docker Hub at pin time.
          image: minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
          # --- Container hardening (MEDIUM-1) ---------------------------------------------------
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          envFrom:
            - secretRef:
                name: forge-objectstore   # MINIO_ROOT_USER / MINIO_ROOT_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forge-minio-data
