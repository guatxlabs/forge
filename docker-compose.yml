# Forge — orchestration de déploiement (usage AUTORISÉ uniquement).
# =============================================================================
#
# Lancer DEPUIS le dossier parent `GUATX/` pour que le contexte de build inclue le
# crate sibling `core/` (guatx-core), dont dépend la console :
#
#     docker compose -f forge/docker-compose.yml up -d --build
#
# Le `context: .` ci-dessous est résolu relativement à CE fichier compose, donc
# `forge/` ; on remonte d'un cran (`..`) pour englober `core/` ET `forge/`.
#
# Sûreté : Forge reste INERTE par défaut (in_scope vide = tout refusé). Le scope/ROE,
# le ledger et la DB sont MONTÉS (volumes), jamais cuits dans l'image. Aucun secret
# n'est en clair ici : les hashes/tokens viennent de `forge/.env` (gitignored).
#
# ⚠️ PRÉ-ÉTAPE OBLIGATOIRE avant `up` : créer le fichier scope.json (bind-mount d'un FICHIER) —
#   sinon Docker crée un RÉPERTOIRE vide ./scope.json à sa place, que la console ne peut pas lire.
#
#       cp scope.example.json scope.json    # depuis forge/, puis éditer AVEC AUTORISATION
#
#   scope.example.json (in_scope vide = INERTE) est committé ; scope.json reste gitignored.
#   Filet de sécurité : l'entrypoint ci-dessous ÉCHOUE BRUYAMMENT si le chemin monté est un
#   répertoire, et bascule sur le scope.example.json embarqué (INERTE) si scope.json manque/vide.
# Env (secrets, connecteurs, boucle purple) : cf. `.env.example` à la racine + Dockerfile.

name: forge

services:
  # ---------------------------------------------------------------------------
  # Console red-team : binaire Rust + python `forge` spawné, UI web + API sur :7100.
  # ---------------------------------------------------------------------------
  forge-console:
    build:
      # Contexte = parent de forge/ (= GUATX/), pour inclure forge/ ET core/.
      context: ..
      dockerfile: forge/Dockerfile
      args:
        # Pins repropagés au Dockerfile (cohérence build reproductible).
        HTTPX_VERSION: "1.6.9"
        NUCLEI_VERSION: "3.3.7"
        SUBFINDER_VERSION: "2.6.7"
    image: forge-console:0.0.1
    container_name: forge-console
    restart: unless-stopped
    # Garde scope fail-loud : conserve tini en PID1 (reaping), puis lance forge-console APRÈS avoir
    # vérifié le scope monté. ÉCHOUE BRUYAMMENT si Docker a créé un répertoire à la place du fichier
    # scope.json (pré-étape oubliée) ; sinon bascule sur le scope.example.json embarqué (INERTE) quand
    # scope.json manque ou est vide. Aucun `$` dans le script (pas d'interpolation compose).
    entrypoint:
      - /usr/bin/tini
      - --
      - /bin/sh
      - -c
      - |
        if [ -d /data/scope/scope.json ]; then
          echo "[forge-console] FATAL: /data/scope/scope.json est un REPERTOIRE, pas un fichier." >&2
          echo "[forge-console] Docker le cree ainsi quand ./scope.json est absent sur l'hote." >&2
          echo "[forge-console] Pre-etape: 'cp scope.example.json scope.json' dans forge/ (editer AVEC AUTORISATION) avant 'docker compose up'." >&2
          exit 1
        fi
        if [ ! -s /data/scope/scope.json ]; then
          echo "[forge-console] WARN: /data/scope/scope.json absent/vide -> repli sur scope.example.json embarque (INERTE: in_scope vide = tout refuse)." >&2
          export FORGE_CONSOLE_SCOPE=/opt/forge/scope.example.json
        fi
        exec forge-console
    # Secrets & overrides d'env : token bearer, hashes argon2id viewer/opérateur,
    # URLs des services pilotés. Fichier gitignored (cf. .gitignore : *.env).
    # Créer forge/.env à partir des variables documentées dans le Dockerfile.
    # `required: false` = absence tolérée (boot sans secrets => token généré au boot,
    # rôles non provisionnés => C2 fermé ; cohérent avec l'inertie par défaut).
    env_file:
      - path: .env
        required: false
    environment:
      # Bind interne au conteneur (réseau Docker isolé). NE PAS exposer publiquement
      # sans reverse-proxy + auth + Host-allowlist (FORGE_CONSOLE_HOST).
      FORGE_CONSOLE_ADDR: "0.0.0.0:7100"
      FORGE_CONSOLE_DB: "/data/db/forge-console.db"
      FORGE_CONSOLE_LEDGER: "/data/ledger/engagement.jsonl"
      FORGE_CONSOLE_SCOPE: "/data/scope/scope.json"
      FORGE_PKG_DIR: "/opt/forge"
      FORGE_PYTHON: "python3"
      FORGE_RUN_TIMEOUT: "900"
      # Service d'accès/évasion (interne au réseau compose). Décommenter le service
      # browser-automation ci-dessous, ou pointer un service externe existant.
      FORGE_BROWSER_URL: "http://browser-automation:8080"
      # Connecteurs opérateur (laisser vide = inerte à fire-time) :
      #   MSF_RPC_HOST / MSF_RPC_PORT / MSF_RPC_USER / MSF_RPC_PASS / MSF_RPC_SSL / MSF_RPC_TOKEN
      #   BURP_API_URL / BURP_API_KEY
      # Boucle purple (mesure de couverture de détection Plume — vide = OFF/fail-open lisible) :
      #   cf. docs/PURPLE_PREREQS.md
      #   PLUME_URL=http://plume-internal:PORT   # http:// uniquement (endpoint interne, pas de TLS console)
      #   PLUME_TOKEN=<base64 user:pass>         # SECRET — Basic auth vers Plume
    ports:
      # Exposé sur loopback hôte uniquement (127.0.0.1) — jamais 0.0.0.0 par défaut.
      - "127.0.0.1:7100:7100"
    volumes:
      # Persistance hors cycle de vie du conteneur.
      - forge-db:/data/db
      - forge-ledger:/data/ledger
      # Scope/ROE ACTIF monté en lecture seule depuis l'hôte (autorisation d'engagement).
      # Remplir ./scope.json AVEC AUTORISATION ; vide/absent = INERTE (fail-closed).
      - ./scope.json:/data/scope/scope.json:ro
    networks:
      - forge-net
    # Le service browser-automation est un service EXTERNE optionnel ; on ne bloque pas
    # le boot de la console dessus (le connecteur sonde à fire-time et reste inerte sinon).
    depends_on:
      - browser-automation
    healthcheck:
      # Sonde TCP du port API via python3 stdlib (présent dans l'image).
      test:
        - "CMD"
        - "python3"
        - "-c"
        - "import socket,sys; s=socket.socket(); s.settimeout(2); sys.exit(s.connect_ex(('127.0.0.1',7100)))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # browser-automation — couche ACCÈS/ÉVASION (Camoufox + Xvfb, port 8080).
  # ---------------------------------------------------------------------------
  # Référencé ici pour documenter l'intégration. L'image vit dans le repo
  # YesWeHack/toolkit/browser-automation (build local `browser-automation-browser`).
  # Adapter `image:` au tag réellement construit sur ta machine, ou remplacer par
  # `build: { context: ../../YesWeHack/toolkit/browser-automation }` si présent.
  browser-automation:
    image: browser-automation-browser:latest
    container_name: forge-browser
    restart: unless-stopped
    # Service interne uniquement : pas de port publié, joignable via le réseau compose
    # à http://browser-automation:8080 (cf. FORGE_BROWSER_URL ci-dessus).
    expose:
      - "8080"
    networks:
      - forge-net

networks:
  forge-net:
    driver: bridge

volumes:
  forge-db:
  forge-ledger:
